<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>飞行中的比熊犬 — 分层 SVG 动画</title>
    <style>
      /* 页面与画布 */
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1a1a2e;
        font-family: system-ui, sans-serif;
      }

      .stage {
        width: min(100vw - 32px, 480px);
        aspect-ratio: 400 / 520;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
      }

      .stage svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* —— 整体浮动（作用于躯干组，子元素随之位移）—— */
      @keyframes float-wave {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-9px);
        }
      }

      /* 浮动：仅加在躯干组上；子组随父级位移 */
      .anim-float {
        animation: float-wave 3.2s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: 50% 45%;
      }

      /* 悬停命中区覆盖整只狗时，躯干浮动略快 */
      #bichon_interactive:hover #body_torso.anim-float {
        animation-duration: 1.85s;
      }

      #bichon_interactive {
        cursor: pointer;
      }

      /* 扩大悬停命中（不改变外观） */
      #bichon_hit {
        fill: transparent;
        pointer-events: all;
      }

      /* —— 四爪交替「狗刨」—— */
      @keyframes paw-wave-a {
        0%,
        100% {
          transform: rotate(-7deg);
        }
        50% {
          transform: rotate(9deg);
        }
      }

      @keyframes paw-wave-b {
        0%,
        100% {
          transform: rotate(8deg);
        }
        50% {
          transform: rotate(-8deg);
        }
      }

      .anim-paw-fl {
        animation: paw-wave-a 1.15s ease-in-out infinite;
        animation-delay: 0s;
        transform-box: fill-box;
        transform-origin: 92% 28%;
      }

      .anim-paw-fr {
        animation: paw-wave-b 1.15s ease-in-out infinite;
        animation-delay: 0.35s;
        transform-box: fill-box;
        transform-origin: 8% 22%;
      }

      .anim-paw-bl {
        animation: paw-wave-b 1.05s ease-in-out infinite;
        animation-delay: 0.2s;
        transform-box: fill-box;
        transform-origin: 88% 12%;
      }

      .anim-paw-br {
        animation: paw-wave-a 1.05s ease-in-out infinite;
        animation-delay: 0.55s;
        transform-box: fill-box;
        transform-origin: 12% 12%;
      }

      /* —— 双耳微风拍打 —— */
      @keyframes ear-flap-left {
        0%,
        100% {
          transform: rotate(-4deg);
        }
        50% {
          transform: rotate(5deg);
        }
      }

      @keyframes ear-flap-right {
        0%,
        100% {
          transform: rotate(5deg);
        }
        50% {
          transform: rotate(-4deg);
        }
      }

      .anim-ear-l {
        animation: ear-flap-left 2.4s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: 100% 50%;
      }

      .anim-ear-r {
        animation: ear-flap-right 2.1s ease-in-out infinite;
        animation-delay: 0.25s;
        transform-box: fill-box;
        transform-origin: 0% 48%;
      }

      /* 尾端轻微摆动 */
      @keyframes tail-wiggle {
        0%,
        100% {
          transform: rotate(-3deg);
        }
        50% {
          transform: rotate(6deg);
        }
      }

      .anim-tail {
        animation: tail-wiggle 2.8s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: 20% 50%;
      }
    </style>
  </head>
  <body>
    <div class="stage" aria-label="飞行姿势的比熊犬矢量动画">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 400 520"
        role="img"
        aria-labelledby="svgTitle svgDesc"
      >
        <title id="svgTitle">飞行中的比熊犬</title>
        <desc id="svgDesc">
          深蓝色天空背景下，白色蓬松比熊犬呈飞行姿势，带浮动、摆爪与摆耳动画。
        </desc>

        <!-- 天空背景（与说明一致的纯色） -->
        <rect id="background" width="400" height="520" fill="#2b76d2" />

        <!-- 可悬停区域：整只狗（不含背景） -->
        <g id="bichon_interactive">
          <!-- 躯干组：内含分层肢体，整体执行浮动 -->
          <g id="body_torso" class="anim-float">
            <!-- 主身体：云状轮廓 + 腹部浅色体积 -->
            <path
              id="fluffy_body"
              fill="#ffffff"
              d="M200 78
                 c48 0 88 28 102 72
                 c6 22 4 46 -8 68
                 c-18 38 -52 62 -94 72
                 c-18 5 -38 6 -58 2
                 c-52 -10 -92 -48 -108 -98
                 c-8 -26 -6 -54 8 -78
                 c22 -42 68 -68 120 -68
                 c12 0 24 2 38 6
                 z"
            />
            <!-- 蓬松边缘装饰（叠圆暗示卷毛） -->
            <g fill="#ffffff" opacity="0.95">
              <circle cx="128" cy="168" r="28" />
              <circle cx="108" cy="228" r="32" />
              <circle cx="292" cy="162" r="30" />
              <circle cx="312" cy="222" r="34" />
              <circle cx="200" cy="318" r="36" />
              <circle cx="148" cy="288" r="26" />
              <circle cx="258" cy="292" r="28" />
            </g>
            <ellipse cx="200" cy="245" rx="72" ry="88" fill="#fceef0" opacity="0.55" />
            <ellipse cx="185" cy="268" rx="40" ry="52" fill="#f0f0f0" opacity="0.5" />

            <!-- 尾巴：外层 translate，内层 CSS 旋转（避免覆盖 SVG transform 落到 0,0） -->
            <g id="tail" transform="translate(268 312)">
              <g class="anim-tail">
                <circle cx="0" cy="0" r="22" fill="#ffffff" />
                <circle cx="-12" cy="8" r="14" fill="#ffffff" />
                <circle cx="10" cy="10" r="12" fill="#f0f0f0" opacity="0.7" />
              </g>
            </g>

            <!-- 后爪左（观者左侧） -->
            <g id="paw_back_left" transform="translate(118 338)">
              <g class="anim-paw-bl">
                <ellipse cx="0" cy="18" rx="26" ry="32" fill="#ffffff" />
                <circle cx="-8" cy="-4" r="16" fill="#ffffff" />
                <g fill="#000000">
                  <ellipse cx="-2" cy="38" rx="10" ry="7" />
                  <circle cx="-14" cy="32" r="5" />
                  <circle cx="2" cy="34" r="5" />
                  <circle cx="14" cy="30" r="5" />
                </g>
              </g>
            </g>

            <!-- 后爪右 -->
            <g id="paw_back_right" transform="translate(268 332)">
              <g class="anim-paw-br">
                <ellipse cx="0" cy="16" rx="24" ry="30" fill="#ffffff" />
                <circle cx="6" cy="-2" r="15" fill="#ffffff" />
                <g fill="#000000">
                  <ellipse cx="4" cy="34" rx="9" ry="6" />
                  <circle cx="-6" cy="28" r="4.5" />
                  <circle cx="6" cy="30" r="4.5" />
                  <circle cx="16" cy="26" r="4.5" />
                </g>
              </g>
            </g>

            <!-- 五官 -->
            <g id="face_features">
              <circle id="eye_left" cx="172" cy="148" r="7" fill="#000000" />
              <circle id="eye_right" cx="228" cy="148" r="7" fill="#000000" />
              <path
                id="nose"
                fill="#000000"
                d="M200 172 l10 14 h-20 z"
                transform="translate(0 -2)"
              />
              <path
                id="mouth"
                stroke="#000000"
                stroke-width="2"
                stroke-linecap="round"
                fill="none"
                d="M192 188 q8 6 16 0"
                opacity="0.85"
              />
            </g>

            <!-- 左耳（狗的左侧 = 画面左侧） -->
            <g id="ear_left" transform="translate(118 128)">
              <g class="anim-ear-l">
                <ellipse cx="-32" cy="8" rx="38" ry="24" fill="#ffffff" transform="rotate(-8 -32 8)" />
                <circle cx="-48" cy="4" r="16" fill="#ffffff" />
                <circle cx="-22" cy="18" r="14" fill="#f0f0f0" opacity="0.45" />
              </g>
            </g>

            <!-- 右耳（略抬高、更外展） -->
            <g id="ear_right" transform="translate(282 118)">
              <g class="anim-ear-r">
                <ellipse cx="32" cy="4" rx="40" ry="26" fill="#ffffff" transform="rotate(10 32 4)" />
                <circle cx="50" cy="0" r="17" fill="#ffffff" />
                <circle cx="24" cy="14" r="14" fill="#fceef0" opacity="0.5" />
              </g>
            </g>

            <!-- 前爪左 -->
            <g id="paw_front_left" transform="translate(138 248)">
              <g class="anim-paw-fl">
                <ellipse cx="-6" cy="22" rx="22" ry="28" fill="#ffffff" />
                <circle cx="-14" cy="4" r="14" fill="#ffffff" />
                <g fill="#000000">
                  <ellipse cx="-6" cy="42" rx="8" ry="6" />
                  <circle cx="-16" cy="36" r="4" />
                  <circle cx="-4" cy="38" r="4" />
                  <circle cx="6" cy="34" r="4" />
                </g>
              </g>
            </g>

            <!-- 前爪右（更靠上、略向内） -->
            <g id="paw_front_right" transform="translate(248 218)">
              <g class="anim-paw-fr">
                <ellipse cx="8" cy="20" rx="21" ry="26" fill="#ffffff" />
                <circle cx="14" cy="2" r="13" fill="#ffffff" />
                <g fill="#000000">
                  <ellipse cx="10" cy="38" rx="8" ry="5.5" />
                  <circle cx="0" cy="32" r="4" />
                  <circle cx="10" cy="34" r="4" />
                  <circle cx="20" cy="30" r="4" />
                </g>
              </g>
            </g>
            <!-- 透明命中层：随躯干浮动，悬停即加速整体浮动 -->
            <rect
              id="bichon_hit"
              x="56"
              y="64"
              width="288"
              height="368"
              rx="100"
              ry="120"
            />
          </g>
        </g>
      </svg>
    </div>
  </body>
</html>
